name: CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Write .env.local
        shell: bash
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" > .env.local

      - name: Run deployment script
        shell: bash
        run: bash scripts/deploy.sh

      - name: Health check
        shell: bash
        run: |
          echo "Waiting for Next.js to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "307" ]; then
              echo "Frontend is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Frontend did not become healthy after 60 seconds"
          exit 1
